<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Elementary Dark</title>
        <link rel="stylesheet" href="stylesheet.css" />
    </head>
    <body>
        <header class="flex-center">
            <div class="width-restrain flex-space-between">
                <h1 id="logo">WaniKani</h1>
            </div>
        </header>
        <div class="flex-center">
            <main class="width-restrain gap">
                <div id="first-row" class="flex-center gap row">
                    <div id="stable" class="gap">
                        <img
                            src="https://assets.wanikani.com/assets/widgets/todays-lessons/lesson-crabigator-b167453d.svg"
                        />
                        <div class="side flex-column-start">
                            <div>
                                <span>Today's</span>
                                <h2>Stable</h2>
                            </div>
                            <span class="subtext-adjust"
                                >very nice, ദ്ദി(˵ •̀ ᴗ - ˵ )</span
                            >
                            <a
                                class="button"
                                href="WaniKani-ElementaryDark.user.css"
                                >Install (github) ❯</a
                            >
                            <a
                                class="button"
                                href="https://userstyles.world/api/style/22026.user.css"
                                >Install (mirror) ❯</a
                            >
                        </div>
                    </div>
                    <div id="nightly" class="gap">
                        <img
                            src="https://assets.wanikani.com/assets/widgets/reviews/neon-50-4a83d7b7.svg"
                        />
                        <div class="side flex-column-start">
                            <h2>Nightly</h2>
                            <span class="subtext-adjust"
                                >up to date with the latest commits</span
                            >
                            <span class="subtext-adjust"
                                ><em>more bug prone</em></span
                            >
                            <a
                                class="button"
                                href="WaniKani-ElementaryDark-nightly.user.css"
                                >Install (github) ❯</a
                            >
                        </div>
                    </div>
                    <div id="forecast" class="temp">TODO</div>
                </div>
                <div id="second-row" class="flex-center gap row">
                    <div class="temp">TODO</div>
                </div>
                <div id="third-row" class="flex-center gap row">
                    <div class="temp">TODO</div>
                    <div class="temp">TODO</div>
                </div>
            </main>
        </div>
